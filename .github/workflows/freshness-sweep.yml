name: Daily freshness sweep

# Runs at 23:00 UTC every day = 02:00 Saudi (UTC+3).
# Sweeps all active listings, HEAD-checks each source_url, marks dead URLs
# inactive. Off-peak by design so we don't compete with site traffic.
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}     # manual trigger from the Actions tab

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 90      # 17k listings × ~130ms ≈ 37 min; 90 leaves headroom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Write .env.local from secrets
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          } > .env.local

      - name: Run freshness sweep
        run: node scripts/freshness_check.js
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Run coverage audit
        run: node scripts/coverage-audit.js
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
